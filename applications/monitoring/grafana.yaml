apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 7.3.7
    chart: grafana
    helm:
      values: |
        adminPassword: "admin"
        service:
          type: ClusterIP
        persistence:
          enabled: true
          type: pvc
          storageClassName: synology-nfs
          accessModes:
            - ReadWriteMany
          size: 10Gi
        securityContext:
          runAsUser: 472
          runAsGroup: 472
          fsGroup: 472
          fsGroupChangePolicy: "OnRootMismatch"
        initChownData:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
