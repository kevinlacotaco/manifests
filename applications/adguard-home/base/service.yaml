apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
spec:
  type: NodePort
  selector:
    app: adguard-home
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
      nodePort: 30053

    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
      nodePort: 30054

    - name: web
      port: 80
      targetPort: 3000
      nodePort: 30080