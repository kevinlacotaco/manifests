apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: networking
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP

    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP

    - name: web
      port: 3000
      targetPort: 3000
