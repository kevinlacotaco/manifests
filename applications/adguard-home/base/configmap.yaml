apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-base-config
  namespace: networking
data:
  base.yaml: |
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      upstream_dns:
        - 1.1.1.1
        - 8.8.8.8

    filtering:
      protection_enabled: true

    http:
      address: 0.0.0.0:3000