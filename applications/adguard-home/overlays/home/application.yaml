apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
spec:
  project: default

  source:
    repoURL: git@github.com:kevinlacotaco/manifests.git
    targetRevision: main
    path: apps/adguard/overlays/home

  destination:
    server: https://kubernetes.default.svc
    namespace: networking

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true